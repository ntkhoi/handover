<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Lark Base Analytics</title>
</head>
<body>
  <header>
    <h1 id="title">Lark Base Analytics</h1>
    <div class="actions">
      <button id="openFull" class="btn primary" disabled>⛶ Open full view</button>
      <button id="openPanel" class="btn">Open panel on page</button>
      <button id="refresh" class="btn">Refresh</button>
      <button id="exportHtml" class="btn" disabled hidden>Export HTML</button>
      <button id="exportCsv" class="btn" disabled hidden>Export CSV</button>
    </div>
    <input id="filter" class="filter" type="text" placeholder="Filter columns by name…" hidden />
  </header>

  <div id="status" class="status"></div>
  <div id="summary" class="summary"></div>
  <div id="rangeBar" class="rangebar"></div>
  <div id="handover"></div>
  <div id="report"></div>

  <script src="lark-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
